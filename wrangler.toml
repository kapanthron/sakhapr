# Cloudflare Worker — SakhaPR backend (static assets + API + R2 storage).
#
# This is now a real Worker (not assets-only): worker/index.js handles /api/*
# and /admin, and serves the static site via the ASSETS binding. Lead packages
# (prescreen.txt + eKTP image + NIK report.pdf + send log) are stored in R2.
#
# Provisioning required in your Cloudflare account (see DEPLOY.md):
#   1. Create an R2 bucket named "sakhapr-leads".
#   2. Set secrets: SESSION_SECRET, and (for real email) RESEND_API_KEY + MAIL_FROM.
# The admin credentials and recipient are in [vars] below (POC). Move ADMIN_PASS
# to a secret for anything beyond a prototype.

name = "sakhapr"
main = "worker/index.js"
compatibility_date = "2026-06-20"

[assets]
directory = "./"
binding = "ASSETS"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "sakhapr-leads"

[vars]
ADMIN_USER = "pocuob"
ADMIN_PASS = "poc2026#"
MAIL_TO = "hendrik.panthron@uob.co.id"
# Set as secrets (wrangler secret put / dashboard), NOT here:
#   SESSION_SECRET   - HMAC key for admin session cookies (required)
#   RESEND_API_KEY   - enables real email; if unset, sends are logged as "not_configured"
#   MAIL_FROM        - verified sender, e.g. "SakhaPR <noreply@yourdomain.com>"
