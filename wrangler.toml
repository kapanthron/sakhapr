# Cloudflare Worker — Moggy backend (static assets + API + R2 storage).
#
# This is now a real Worker (not assets-only): worker/index.js handles /api/*
# and /admin, and serves the static site via the ASSETS binding. Lead packages
# (prescreen.txt + eKTP image + NIK report.pdf + send log) are stored in R2.
#
# Provisioning required in your Cloudflare account (see DEPLOY.md):
#   1. Create an R2 bucket named "sakhapr-leads".
#   2. Set secrets: SESSION_SECRET, and (for real email) RESEND_API_KEY + MAIL_FROM.
# The admin credentials and recipient are in [vars] below (POC). Move ADMIN_PASS
# to a secret for anything beyond a prototype.

name = "sakhapr"
main = "worker/index.js"
compatibility_date = "2026-06-20"

[assets]
directory = "./"
binding = "ASSETS"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "sakhapr-leads"

# Cloudflare D1 — structured CMS data (leads, files, status, audit, metrics).
# Bound as env.DB. Run cms/schema.sql against this database once (see CMS_SETUP.md).
[[d1_databases]]
binding = "DB"
database_name = "moggy-cms"
database_id = "0451ed4a-d114-4683-b1e7-23b5d40c3530"

# Workers AI — free, integrated, no API key. Powers the /api/chat RAG endpoint.
[ai]
binding = "AI"

# Cron Triggers — CMS Phase 4 SLA sweep. Runs the scheduled() handler every 5
# minutes: overdue call/WA tasks -> reminder email to the sales owner; every
# Friday 15:00 WIB (08:00 UTC) a weekly sweep of leads with no update that week.
[triggers]
crons = ["*/5 * * * *"]

[vars]
ADMIN_USER = "panthronpoc"
# Phase 8: NO password in the repo. The admin password is chosen on first login
# and stored hashed in D1 (app_auth table). ADMIN_PASS / ADMIN_PASS_SHA256 below
# are only a fallback for when D1 is not connected.
MAIL_TO = "hendrik.panthron@gmail.com"
# Set as secrets (wrangler secret put / dashboard), NOT here:
#   SESSION_SECRET   - HMAC key for admin session cookies (required)
#   RESEND_API_KEY   - enables real email. With ONLY this set, email is sent
#                      from onboarding@resend.dev to MAIL_TO. That test sender
#                      can deliver only to the email that OWNS the Resend account,
#                      so MAIL_TO must be your Resend signup email. No domain needed.
#   MAIL_FROM        - (optional) a verified sender on your own domain, e.g.
#                      "Moggy <noreply@yourdomain.com>". Needed only to send to
#                      addresses other than your own / from your brand domain.
#   GEMINI_API_KEY   - free Google AI Studio key; powers /api/chat AND the eKTP
#                      OCR (/api/ocr). GEMINI_MODEL optionally pins the primary
#                      model; GEMINI_FALLBACK_MODEL optionally pins the model used
#                      when the primary is rate-limited (429). Both auto-discover:
#                      primary = newest non-lite Flash, fallback = newest lite Flash.
#   ADMIN_PASS_SHA256- (hardening) SHA-256 hex of the admin password. If set, it
#                      is used instead of ADMIN_PASS; then delete ADMIN_PASS from
#                      [vars] above so no plaintext password lives in the repo.
#                      Generate: printf 'poc2026#' | shasum -a 256
#   (Password reset) The "Lupa / reset kata sandi?" button emails a random
#                      temporary password to MAIL_TO via Resend, so it needs
#                      RESEND_API_KEY set. No extra secret is required; the temp
#                      password only ever goes to MAIL_TO (the owner's inbox).
