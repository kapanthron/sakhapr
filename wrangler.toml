# Cloudflare Workers — static-assets config for SakhaPR.
#
# This project deploys via the Workers Builds flow (Deploy command:
# `npx wrangler deploy`). SakhaPR has NO build step and no server-side code:
# it is a static site served from the repo root as Worker Assets.
#
# `wrangler deploy` reads the [assets] block below and uploads the directory.
# The _headers file in that directory (the strict CSP) is applied by Workers
# Assets, exactly as it would be on Pages.

name = "sakhapr"
compatibility_date = "2026-06-20"

[assets]
directory = "./"

# Notes:
# - No `main` / Worker script: this is an assets-only deployment.
# - Keep the Deploy command as `npx wrangler deploy` (the default for this flow).
# - .assetsignore (next to this file) keeps docs/config out of the public site.
# - Classic Pages alternative (different flow): a project whose Deploy command is
#   `npx wrangler pages deploy . --project-name sakhapr` would instead use
#   `pages_build_output_dir = "."` and ignore the [assets] block.
